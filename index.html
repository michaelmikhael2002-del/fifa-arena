<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIFA Arena</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: Arial, sans-serif; background: #001B5E; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 0; }
.card { width: 100%; max-width: 520px; background: #fff; min-height: 100vh; overflow: hidden; }
@media (min-width: 540px) { body { align-items: center; padding: 20px; } .card { min-height: auto; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); } }
.header { background: #003087; padding: 18px 24px 14px; }
.header-eyebrow { font-size: 10px; color: #7EB3E8; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.header-title { font-size: 20px; font-weight: 700; color: #fff; }
.header-date { font-size: 11px; color: #A8C8F0; margin-top: 5px; }
.loading { padding: 60px 24px; text-align: center; }
.spinner { width: 44px; height: 44px; border: 4px solid #EEF0F2; border-top: 4px solid #003087; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 13px; color: #546E7A; }
.body { padding: 18px 20px 22px; }
.field { margin-bottom: 16px; }
.field-label { font-size: 10px; font-weight: 700; color: #546E7A; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 7px; }
.choices { display: flex; gap: 7px; flex-wrap: wrap; }
.choices.col { flex-direction: column; gap: 5px; }
.btn { flex: 1; min-width: 70px; padding: 14px 10px; border-radius: 10px; border: 2px solid #003087; background: #fff; color: #003087; font-size: 14px; font-weight: 700; font-family: Arial, sans-serif; cursor: pointer; text-align: center; transition: all 0.12s; user-select: none; box-shadow: 0 2px 6px rgba(0,48,135,0.12); }
.btn.left { text-align: left; padding: 14px 16px; }
.btn:active { transform: scale(0.97); }
.btn.sel { background: #003087; border-color: #003087; color: #fff; box-shadow: 0 4px 12px rgba(0,48,135,0.3); }
.num-row { display: flex; gap: 14px; margin-bottom: 16px; }
.num-field { flex: 1; }
.num-field .icon { display: block; text-align: center; font-size: 22px; margin-bottom: 3px; }
.num-field label { display: block; font-size: 10px; font-weight: 700; color: #546E7A; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
.num-field input { width: 100%; padding: 11px 8px; border-radius: 8px; border: 2px solid #003087; font-size: 24px; font-weight: 700; text-align: center; font-family: Arial, sans-serif; color: #2c3e50; background: #F8F9FA; outline: none; }
.num-field input:focus { border-color: #001B5E; background: #fff; }
.total { display: none; background: #EBF0F8; border-radius: 8px; padding: 8px 14px; text-align: center; font-size: 13px; color: #546E7A; margin-bottom: 14px; }
.total strong { color: #003087; font-size: 16px; }
.divider { height: 1px; background: #EEF0F2; margin: 4px 0 16px; }
.date-note { text-align: center; font-size: 11px; color: #95a5a6; background: #F8F9FA; border-radius: 7px; padding: 7px; margin-bottom: 16px; border: 1px solid #ECECEC; }
.error { display: none; background: #FDECEA; border-radius: 8px; padding: 8px 14px; text-align: center; font-size: 12px; color: #A32D2D; margin-bottom: 12px; }
.submit { width: 100%; padding: 16px; border-radius: 10px; border: none; background: #003087; color: #fff; font-size: 16px; font-weight: 700; font-family: Arial, sans-serif; cursor: pointer; }
.submit:active { transform: scale(0.98); }
.sending { display: none; padding: 40px 24px; text-align: center; }
.sending .spinner { width: 48px; height: 48px; margin-bottom: 20px; }
.sending-txt { font-size: 15px; color: #546E7A; font-weight: 600; }
.confirm { display: none; padding: 40px 24px; text-align: center; }
.confirm-icon { width: 64px; height: 64px; border-radius: 50%; background: #D5EFE1; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
.confirm-title { font-size: 20px; font-weight: 700; color: #1A7A4A; margin-bottom: 8px; }
.confirm-detail { font-size: 13px; color: #546E7A; line-height: 1.7; margin-bottom: 10px; }
.confirm-badge { font-size: 11px; color: #1A7A4A; background: #D5EFE1; border-radius: 20px; padding: 4px 14px; display: inline-block; margin-bottom: 22px; font-weight: 700; }
.countdown { font-size: 12px; color: #95a5a6; margin-bottom: 14px; }
.new-btn { padding: 10px 26px; border-radius: 8px; border: 1.5px solid #DDE3EA; background: #F8F9FA; color: #2c3e50; font-size: 13px; font-weight: 600; font-family: Arial, sans-serif; cursor: pointer; }
.err-screen { display: none; padding: 40px 24px; text-align: center; }
.err-icon { width: 64px; height: 64px; border-radius: 50%; background: #FDECEA; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 28px; }
.err-title { font-size: 18px; font-weight: 700; color: #C00000; margin-bottom: 8px; }
.err-msg { font-size: 13px; color: #546E7A; margin-bottom: 24px; }
.retry-btn { padding: 12px 28px; border-radius: 8px; border: none; background: #003087; color: #fff; font-size: 14px; font-weight: 700; font-family: Arial, sans-serif; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-eyebrow" id="h-eyebrow">FIFA Arena</div>
    <div class="header-title" id="h-title">Session Register</div>
    <div class="header-date" id="hdate"></div>
  </div>
  <div class="loading" id="loading-view">
    <div class="spinner"></div>
    <div class="loading-txt" id="loading-txt">Loading...</div>
  </div>
  <div class="body" id="form-view" style="display:none;">
    <div class="field"><div class="field-label" id="lbl-school">School</div><div class="choices" id="school-btns"></div></div>
    <div class="field"><div class="field-label" id="lbl-activity">Activity Type</div><div class="choices col" id="activity-btns"></div></div>
    <div class="field"><div class="field-label" id="lbl-duration">Session Duration</div><div class="choices" id="duration-btns"></div></div>
    <div class="field"><div class="field-label" id="lbl-age">Age Category</div><div class="choices" id="age-btns"></div></div>
    <div class="divider"></div>
    <div class="num-row">
      <div class="num-field"><span class="icon">👦</span><label id="lbl-boys">Boys</label><input type="number" id="boys" min="0" placeholder="0" oninput="updTotal()"></div>
      <div class="num-field"><span class="icon">👧</span><label id="lbl-girls">Girls</label><input type="number" id="girls" min="0" placeholder="0" oninput="updTotal()"></div>
    </div>
    <div class="total" id="total-pill">Total: <strong id="total-num">0</strong></div>
    <div class="date-note" id="lbl-date-note">Date & time recorded automatically</div>
    <div class="error" id="err-msg"></div>
    <button class="submit" id="btn-submit" onclick="submitForm()">Submit Session</button>
  </div>
  <div class="sending" id="sending-view"><div class="spinner"></div><div class="sending-txt" id="lbl-sending">Sending...</div></div>
  <div class="confirm" id="confirm-view">
    <div class="confirm-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="#1A7A4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="confirm-title" id="lbl-confirm-title">Session recorded!</div>
    <div class="confirm-detail" id="confirm-detail"></div>
    <div class="confirm-badge" id="lbl-confirm-badge">✓ Saved to Google Sheet</div>
    <div class="countdown" id="lbl-countdown">New session in <span id="cd">3</span>s...</div>
    <button class="new-btn" id="btn-new" onclick="reset()">New session now</button>
  </div>
  <div class="err-screen" id="err-view">
    <div class="err-icon">⚠️</div>
    <div class="err-title" id="lbl-err-title">Submission failed</div>
    <div class="err-msg" id="lbl-err-msg">Check your internet connection and try again.</div>
    <button class="retry-btn" id="btn-retry" onclick="retry()">Try again</button>
  </div>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbx4vq4nToU47YcxzEGC2Gf-SN4y0J5y3pZMJg2kB-dc9Po59KKlyFkdEM6pheREhSxLig/exec";

const st = {school:null, activity:null, duration:null, age:null};
let lastPayload = null;
let lang = "en"; // default

// ── TRANSLATIONS ─────────────────────────────────────────────────────
const T = {
  en: {
    eyebrow: "FIFA Arena",
    title: "Session Register",
    loading: "Loading form...",
    school: "School",
    activity: "Activity Type",
    duration: "Session Duration",
    age: "Age Category",
    boys: "Boys",
    girls: "Girls",
    total: "Total",
    participants: "participants",
    date_note: "Date & time recorded automatically",
    err_complete: "Please complete all selections before submitting.",
    err_participants: "Please enter at least one participant.",
    submit: "Submit Session",
    sending: "Sending to FIFA sheet...",
    confirm_title: "Session recorded!",
    confirm_badge: "✓ Saved to Google Sheet",
    countdown: "New session in",
    btn_new: "New session now",
    err_title: "Submission failed",
    err_msg: "Check your internet connection and try again.",
    retry: "Try again",
    locale: "en-GB"
  },
  fr: {
    eyebrow: "FIFA Arena · Maroc",
    title: "Registre de Session",
    loading: "Chargement du formulaire...",
    school: "École",
    activity: "Type d'Activité",
    duration: "Durée de la Session",
    age: "Catégorie d'Âge",
    boys: "Garçons",
    girls: "Filles",
    total: "Total",
    participants: "participants",
    date_note: "Date et heure enregistrées automatiquement",
    err_complete: "Veuillez compléter toutes les sélections avant de soumettre.",
    err_participants: "Veuillez saisir au moins un participant.",
    submit: "Soumettre la Session",
    sending: "Envoi vers la feuille FIFA...",
    confirm_title: "Session enregistrée !",
    confirm_badge: "✓ Enregistré dans Google Sheet",
    countdown: "Nouvelle session dans",
    btn_new: "Nouvelle session maintenant",
    err_title: "Échec de l'envoi",
    err_msg: "Vérifiez votre connexion internet et réessayez.",
    retry: "Réessayer",
    locale: "fr-FR"
  }
};

function applyLanguage(l) {
  lang = (l && l.toLowerCase() === "fr") ? "fr" : "en";
  const t = T[lang];
  document.getElementById("h-eyebrow").textContent    = t.eyebrow;
  document.getElementById("h-title").textContent      = t.title;
  document.getElementById("loading-txt").textContent  = t.loading;
  document.getElementById("lbl-school").textContent   = t.school;
  document.getElementById("lbl-activity").textContent = t.activity;
  document.getElementById("lbl-duration").textContent = t.duration;
  document.getElementById("lbl-age").textContent      = t.age;
  document.getElementById("lbl-boys").textContent     = t.boys;
  document.getElementById("lbl-girls").textContent    = t.girls;
  document.getElementById("lbl-date-note").textContent= t.date_note;
  document.getElementById("btn-submit").textContent   = t.submit;
  document.getElementById("lbl-sending").textContent  = t.sending;
  document.getElementById("lbl-confirm-title").textContent = t.confirm_title;
  document.getElementById("lbl-confirm-badge").textContent = t.confirm_badge;
  document.getElementById("btn-new").textContent      = t.btn_new;
  document.getElementById("lbl-err-title").textContent= t.err_title;
  document.getElementById("lbl-err-msg").textContent  = t.err_msg;
  document.getElementById("btn-retry").textContent    = t.retry;
  // Date
  const now = new Date();
  document.getElementById("hdate").textContent =
    now.toLocaleDateString(t.locale, {weekday:"long", day:"2-digit", month:"long", year:"numeric"}) +
    "  ·  " + now.toLocaleTimeString(t.locale, {hour:"2-digit", minute:"2-digit"});
}

// ── VIEWS ─────────────────────────────────────────────────────────────
function show(id) {
  ["loading-view","form-view","sending-view","confirm-view","err-view"]
    .forEach(v => document.getElementById(v).style.display = v===id ? "block" : "none");
}

// ── BUTTONS ───────────────────────────────────────────────────────────
function makeButtons(containerId, items, group, col) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  if(col) el.classList.add("col"); else el.classList.remove("col");
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "btn" + (col ? " left" : "");
    btn.textContent = item;
    btn.onclick = () => {
      el.querySelectorAll(".btn").forEach(b => b.classList.remove("sel"));
      btn.classList.add("sel");
      st[group] = item;
    };
    el.appendChild(btn);
  });
}

// ── DEFAULTS ──────────────────────────────────────────────────────────
function useDefaults() {
  const isFr = lang === "fr";
  makeButtons("school-btns",   ["School 1","School 2"],                                                          "school",   false);
  makeButtons("activity-btns", isFr ? ["Éducation Physique","Académie","Initiative Communautaire"] :
                                       ["Physical Education","Academy Training","Community Initiative"],          "activity", true);
  makeButtons("duration-btns", ["60min","90min","120min"],                                                        "duration", false);
  makeButtons("age-btns",      ["U6","U8","U10","U12","U14"],                                                     "age",      false);
  show("form-view");
}

// ── LOAD PARAMS FROM SHEET ────────────────────────────────────────────
function loadParams() {
  window._handleParams = function(data) {
    // Apply language first
    applyLanguage(data.language && data.language[0] ? data.language[0] : "en");
    // Then build buttons
    makeButtons("school-btns",   data.schools    && data.schools.length    ? data.schools    : ["School 1","School 2"],            "school",   false);
    makeButtons("activity-btns", data.activities && data.activities.length ? data.activities : ["Physical Education","Academy Training","Community Initiative"], "activity", true);
    makeButtons("duration-btns", data.durations  && data.durations.length  ? data.durations  : ["60min","90min","120min"],          "duration", false);
    makeButtons("age-btns",      data.ages       && data.ages.length       ? data.ages       : ["U6","U8","U10","U12","U14"],        "age",      false);
    show("form-view");
  };
  const s = document.createElement("script");
  s.src = SHEET_URL + "?action=params&callback=_handleParams";
  s.onerror = () => { applyLanguage("en"); useDefaults(); };
  document.head.appendChild(s);
  setTimeout(() => {
    if(document.getElementById("loading-view").style.display !== "none") {
      applyLanguage("en"); useDefaults();
    }
  }, 5000);
}

// ── TOTAL ─────────────────────────────────────────────────────────────
function updTotal() {
  const b = parseInt(document.getElementById("boys").value)||0;
  const g = parseInt(document.getElementById("girls").value)||0;
  const t = T[lang];
  const pill = document.getElementById("total-pill");
  if(b+g>0) {
    pill.style.display = "block";
    pill.innerHTML = t.total + ": <strong id='total-num'>" + (b+g) + "</strong> " + t.participants;
  } else pill.style.display = "none";
}

// ── SUBMIT ────────────────────────────────────────────────────────────
function submitForm() {
  const b = parseInt(document.getElementById("boys").value)||0;
  const g = parseInt(document.getElementById("girls").value)||0;
  const t = T[lang];
  const err = document.getElementById("err-msg");
  if(!st.school||!st.activity||!st.duration||!st.age) {
    err.style.display="block"; err.textContent=t.err_complete; return;
  }
  if(b===0&&g===0) {
    err.style.display="block"; err.textContent=t.err_participants; return;
  }
  err.style.display="none";
  lastPayload = {school:st.school, activity:st.activity, duration:st.duration, age:st.age, boys:b, girls:g};
  document.getElementById("confirm-detail").innerHTML =
    "<strong>"+st.school+"</strong><br>"+st.activity+" · "+st.duration+" · "+st.age+
    "<br><br>👦 "+b+" "+t.boys.toLowerCase()+" &nbsp;·&nbsp; 👧 "+g+" "+t.girls.toLowerCase()+
    " &nbsp;·&nbsp; <strong>"+(b+g)+" "+t.total.toLowerCase()+"</strong>";
  show("sending-view");
  sendData(lastPayload);
}

function sendData(payload) {
  const params = new URLSearchParams({
    action:"submit", school:payload.school, activity:payload.activity,
    duration:payload.duration, age:payload.age, boys:payload.boys, girls:payload.girls
  });
  fetch(SHEET_URL+"?"+params.toString(), {method:"GET", mode:"no-cors"})
    .then(() => {
      show("confirm-view");
      let secs=3; const cd=document.getElementById("cd");
      const t=T[lang];
      document.getElementById("lbl-countdown").innerHTML = t.countdown+" <span id='cd'>3</span>s...";
      const timer=setInterval(()=>{ secs--; document.getElementById("cd").textContent=secs; if(secs<=0){clearInterval(timer);reset();} },1000);
    })
    .catch(() => show("err-view"));
}

function retry() { if(lastPayload){show("sending-view");sendData(lastPayload);}else show("form-view"); }

function reset() {
  st.school=st.activity=st.duration=st.age=null;
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("sel"));
  document.getElementById("boys").value="";
  document.getElementById("girls").value="";
  document.getElementById("total-pill").style.display="none";
  document.getElementById("err-msg").style.display="none";
  show("form-view");
}

// ── START ─────────────────────────────────────────────────────────────
loadParams();
</script>
</body>
</html>
